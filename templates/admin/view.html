{% extends "admin/base.html" %}

{% block content %}
<form method="POST" action="{{ url_for('admin.process_results') }}" enctype="multipart/form-data">
  {{ form.hidden_tag() }}
  
  <div class="form-group">
    {{ form.operation.label }}
    {{ form.operation(class="form-control") }}
  </div>
  
  <div class="form-group">
    {{ form.batch_file.label }}
    {{ form.batch_file(class="form-control-file") }}
  </div>
  
  <button type="submit" class="btn btn-success">Process</button>
</form>
{% endblock %}




<form method="POST" action="{{ url_for('admin.process_results') }}" enctype="multipart/form-data">
  <label for="operation">Choose Operation:</label>
  <select name="operation" id="operation">
      <option value="detect_fake">Detect Fake Profile</option>
      <option value="verify_profile">Verify Profile</option>
  </select>

  <br><br>

  <label for="batch_file">Upload File:</label>
  <input type="file" name="batch_file" id="batch_file" required>

  <br><br>

  <button type="submit">Submit</button>
</form>
